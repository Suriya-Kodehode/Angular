<main class="container home">
  <section class="home__hero">
    <h1 class="home__title">Welcome to MyApp</h1>
    <p class="home__subtitle">A modern Angular starter with theming, SSR, and a clean architecture.</p>
    <div class="home__actions">
      <app-button color="primary" variant="fill" size="md" type="button" routerLink="/auth/register">
        Get started
      </app-button>
      <app-button color="primary" variant="outline" size="md" type="button" routerLink="/auth/login">
        Sign in
      </app-button>
      <app-button color="primary" variant="outline" size="md" type="button" (click)="logCount()">
        Console test
      </app-button>
    </div>
  </section>
</main>
