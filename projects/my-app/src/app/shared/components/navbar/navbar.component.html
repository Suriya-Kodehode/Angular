<nav class="navbar">
  <div class="navbar__start">
    <app-button
      class="navbar__menu-button"
      [class.is-expanded]="sidebarExpanded()"
      variant="transparent"
      type="button"
      [hover]="true"
      [attr.aria-label]="sidebarExpanded() ? 'Close sidebar' : 'Open sidebar'"
      [attr.aria-expanded]="sidebarExpanded()"
      (click)="onMenuClick()"
    >
      <span
        class="navbar__menu-icon"
        aria-hidden="true"
        [adaptSvg]="menuIconVm"
      ></span>
    </app-button>
    <a class="navbar__brand" routerLink="/">MyApp</a>
  </div>
  <ul class="navbar__links">
    <li><a routerLink="/auth/login">Login</a></li>
    <li><a routerLink="/auth/register">Register</a></li>
  </ul>
</nav>
