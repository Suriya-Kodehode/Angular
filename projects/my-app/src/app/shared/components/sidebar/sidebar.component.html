<aside class="sidebar" [class.sidebar--expanded]="expanded()" [class.sidebar--shrink]="!expanded()">
  <nav class="sidebar__nav">
    <ul class="sidebar__links">
      @for (item of navItems; track item.route) {
        <li>
          <app-sidebar-item
            [label]="item.label"
            [icon]="item.icon"
            [route]="item.route"
            [exact]="item.exact"
            [expanded]="expanded()"
          />
        </li>
      }
    </ul>
  </nav>
</aside>
